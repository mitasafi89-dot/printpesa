name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck (shared / engine / api)
        run: npx tsc -b packages/shared apps/engine apps/api
      - name: Build web (includes type checking)
        run: npm -w @printpesa/web run build
      - name: Test
        run: npm test
